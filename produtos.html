<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos — Labubu Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page-hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🛍️ Labubu Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
                <a class="btn btn-outline-light btn-sm" href="carrinho.html">
                    🛒 Carrinho <span id="carrinho-count" class="badge bg-warning text-dark ms-1">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Hero -->
    <section class="page-hero text-white py-5">
        <div class="container py-2">
            <span class="section-label text-warning">Catálogo</span>
            <h1 class="fw-bold text-white mt-2 mb-1">Nossos Produtos</h1>
            <p class="text-white-50 mb-0">Explore nossa seleção com qualidade e os melhores preços.</p>
        </div>
    </section>

    <div class="container py-5">
        <div id="lista-produtos" class="row"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white-50 py-4 mt-5">
        <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
            <span class="fw-bold text-white">🛍️ Labubu Store</span>
            <span class="small">© 2026 Labubu Store. Todos os direitos reservados.</span>
            <a href="mailto:contato@meusite.com" class="text-white-50 small text-decoration-none">✉️ contato@meusite.com</a>
        </div>
    </footer>

    <!-- Modal de detalhes do produto -->
    <div class="modal fade" id="modalProduto" tabindex="-1" aria-labelledby="modalProdutoTitulo" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalProdutoTitulo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <p id="modalProdutoDescricao"></p>
                    <p class="fw-bold fs-5" id="modalProdutoPreco"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
